<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grovillon Maison</title>
    <link rel="icon" href="/favicon.ico" />
    <meta name="description" content="Grovillon Maison — Silent force, lasting influence. An exclusive, invitation-only project currently in development." />
    <style>
      body {
        background-color: black;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        font-family: 'Georgia', serif;
        text-align: center;
        margin: 0;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: gray;
        margin-top: 0;
      }
      .info {
        position: absolute;
        bottom: 80px;
        font-size: 0.9rem;
        color: #ccc;
      }
      .info a {
        color: #ccc;
        text-decoration: underline;
      }
      button {
        margin-top: 20px;
        background-color: transparent;
        border: 1px solid #fff;
        color: white;
        padding: 10px 20px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        background-color: white;
        color: black;
      }
      #modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      form {
        background-color: #111;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        max-width: 350px;
        width: 90%;
        position: relative;
      }
      form input,
      form textarea {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #222;
        color: white;
        font-size: 0.95rem;
      }
      form textarea {
        resize: vertical;
        min-height: 80px;
      }
      form label {
        font-size: 0.85rem;
        color: #aaa;
        display: block;
        text-align: left;
      }
      form label input[type="checkbox"] {
        margin-right: 8px;
        transform: scale(1.2);
      }
      form label a {
        color: #3581b1;
        text-decoration: underline;
      }
      form .submit {
        background: white;
        color: black;
        border: none;
        padding: 10px 25px;
        font-weight: bold;
        font-size: 1rem;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }
      form .submit:hover {
        background: #ddd;
      }
      #loader {
        display: none;
        color: white;
        margin-top: 20px;
      }
      #confirmation {
        display: none;
        color: lightgreen;
        margin-top: 20px;
        text-align: center;
        max-width: 300px;
      }
      #closeModal {
        position: absolute;
        top: 10px;
        right: 15px;
        cursor: pointer;
        color: #888;
        font-size: 0.9rem;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>Grovillon Maison</h1>
    <p>Silent force, lasting influence</p>
    <div class="info">
      <p>An exclusive, invitation-only project currently in development.</p>
      <p>For inquiries: <a href="mailto:d@grovillon.com">d@grovillon.com</a></p>
      <p>(NDA-protected collaborations only)</p>
      <button onclick="document.getElementById('modal').style.display='flex'">Request Access</button>
    </div>

    <div id="modal">
      <form id="accessForm">
        <div id="closeModal" onclick="document.getElementById('modal').style.display='none'">Close</div>
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="text" id="organization" placeholder="Organization / Affiliation (optional)" />
        <textarea id="reason" placeholder="Reason for Request" required></textarea>
        <label>
          <input type="checkbox" id="agree" required />I agree to the
          <a href="https://github.com/Grovillon/grovillon-assets/raw/main/terms-preview.pdf" target="_blank" rel="noopener noreferrer">preliminary confidentiality terms</a>.
        </label>
        <button class="submit" type="submit">Submit Request</button>
      </form>
      <div id="loader">Sending your request...</div>
      <div id="confirmation">Your request has been received. Please check your email for the next steps.</div>
    </div>

    <script>
      const form = document.getElementById('accessForm');
      const loader = document.getElementById('loader');
      const confirmation = document.getElementById('confirmation');

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        loader.style.display = 'block';
        confirmation.style.display = 'none';

        const data = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          organization: document.getElementById('organization').value,
          reason: document.getElementById('reason').value,
          agreed: document.getElementById('agree').checked
        };

        fetch('https://hook.eu2.make.com/la4g179q26aiawzkvoyd929c4xlbdikb', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        .then(response => {
          loader.style.display = 'none';
          confirmation.style.display = 'block';
          form.reset();
        })
        .catch(error => {
          loader.innerText = 'Something went wrong. Please try again later.';
        });
      });
    </script>
  </body>
</html>
